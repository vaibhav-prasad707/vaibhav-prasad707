<svg xmlns="http://w3.org" width="300" height="40" viewBox="0 0 300 40">
  <style>
    .text {
      font-family: monospace;
      font-size: 18px;
      font-weight: bold;
      fill: #24292e; /* Dark gray text, matches GitHub light mode */
    }
    .cursor {
      fill: orange;
      animation: blink 0.75s step-end infinite;
    }
    @keyframes blink { 
      from, to { opacity: 0 } 
      50% { opacity: 1 } 
    }
  </style>

  <!-- Clean SVG text wrapper instead of HTML divs -->
  <text x="10" y="25" class="text">Hey, it's Vaibhav Prasad!</text>
  
  <!-- The blinking cursor placed right after your text -->
  <rect x="255" y="10" width="3" height="18" class="cursor" />
</svg>
